# phonefast Release Pipeline
#
# 触发方式: 推送 v* tag (如 v1.0.0) 到 GitHub（任何分支）
# 构建方案: 方案3 — 每平台原生 runner 编译 (最稳)
#   - linux/amd64   → ubuntu-24.04 (amd64, gcc)
#   - linux/arm64   → ubuntu-24.04-arm (arm64, gcc)
#   - darwin/arm64  → macos-14 (arm64, clang)
#   - darwin/arm64  → macos-14 (arm64, clang)
#   - windows/amd64 → cross from ubuntu-24.04 (mingw-w64)
#
# 前置条件:
#   仓库中需包含 android/scrcpy-server.jar (已提交)
#   FFmpeg 源码编译消耗约 5-15 分钟/平台 (已配置缓存加速)
#
# 产物:
#   GitHub Release Assets:
#     phonefast-<version>-linux-amd64.tar.gz
#     phonefast-<version>-linux-arm64.tar.gz
#     phonefast-<version>-darwin-arm64.tar.gz
#     phonefast-<version>-darwin-arm64-full.tar.gz   (自包含, ONNX Runtime 内嵌)
#     phonefast-<version>-linux-amd64-full.tar.gz    (自包含, ONNX Runtime 内嵌)
#     phonefast-<version>-windows-amd64.tar.gz

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── 所有平台并行构建 ──────────────────────────────────────────────────
  build:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-24.04
            ffmpeg-target: x86_64-linux-gnu
            goos: linux
            goarch: amd64
            ext: ''
            deps-apt: build-essential nasm pkg-config

          - name: linux-arm64
            runner: ubuntu-24.04-arm
            ffmpeg-target: aarch64-linux-gnu
            goos: linux
            goarch: arm64
            ext: ''
            deps-apt: build-essential nasm pkg-config

          - name: darwin-arm64
            runner: macos-14
            ffmpeg-target: aarch64-darwin
            goos: darwin
            goarch: arm64
            ext: ''
            deps-brew: nasm pkg-config

          - name: windows-amd64
            runner: ubuntu-24.04
            ffmpeg-target: x86_64-windows-gnu
            goos: windows
            goarch: amd64
            ext: .exe
            deps-apt: gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 binutils-mingw-w64-x86-64 nasm pkg-config
            cross-cc: x86_64-w64-mingw32-gcc
            cross-cxx: x86_64-w64-mingw32-g++

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      # ── 安装系统依赖 ──
      - name: Install dependencies (apt)
        if: matrix.deps-apt != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.deps-apt }}

      - name: Install dependencies (brew)
        if: matrix.deps-brew != ''
        run: |
          brew update > /dev/null 2>&1
          brew install ${{ matrix.deps-brew }}

      # ── FFmpeg 静态库 ──
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: build/cross-ffmpeg/${{ matrix.ffmpeg-target }}
          key: ffmpeg-${{ matrix.ffmpeg-target }}-${{ hashFiles('scripts/cross-build-ffmpeg.sh') }}
          restore-keys: |
            ffmpeg-${{ matrix.ffmpeg-target }}-

      - name: Build FFmpeg static libs (with ASM)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          echo "::group::FFmpeg build log"
          bash scripts/cross-build-ffmpeg.sh ${{ matrix.ffmpeg-target }}
          echo "::endgroup::"
          # 验证 ASM 是否开启
          if grep -q 'HAVE_MMX\|HAVE_SSE\|HAVE_AVX' "build/cross-ffmpeg/${{ matrix.ffmpeg-target }}/include/libavcodec/config.h" 2>/dev/null; then
            echo "[✓] ASM (MMX/SSE/AVX) 已启用 — ${{ matrix.ffmpeg-target }}"
          else
            echo "[!] ASM 检测跳过 (aarch64 NEON 内建于工具链)"
          fi

      - name: Show FFmpeg libs
        run: |
          ls -lh "build/cross-ffmpeg/${{ matrix.ffmpeg-target }}/lib/"*.a 2>/dev/null || echo "(libs not found)"

      # ── Android 资源 ──
      - name: Sync Android assets
        run: |
          mkdir -p assets
          if [ -f android/scrcpy-server.jar ]; then
            cp android/scrcpy-server.jar assets/
            echo "[✓] scrcpy-server.jar synced"
          else
            echo "[ERROR] android/scrcpy-server.jar not found — commit it first"
            exit 1
          fi
          if [ -f android/scrcpy-server.version ]; then
            cp android/scrcpy-server.version assets/
          fi

      # ── OCR 资源 ──
      # Models (PP-OCR v3 ONNX) are platform-independent and embedded into every
      # binary; download them for all targets.
      - name: Download OCR models
        run: bash scripts/download-ocr-models.sh --models

      # The ONNX Runtime shared library is platform-specific. Only darwin/arm64
      # embeds it (assets/ocr/lib_darwin_arm64.go); for that target we fetch the
      # osx-arm64 lib from the ORT GitHub release (works on any CI runner).
      # Other targets load the system lib at runtime (or OCR returns ErrNotAvailable).
      - name: Download OCR runtime library (darwin/arm64 only)
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        run: bash scripts/download-ocr-models.sh --lib --target darwin/arm64

      # Install ONNX Runtime system-wide for linux runners so OCR smoke tests
      # pass. Not needed for darwin (brew install onnxruntime) or windows.
      - name: Install ONNX Runtime (linux only)
        if: matrix.goos == 'linux'
        run: |
          case "${{ matrix.goarch }}" in
            amd64) ORT_ARCH="linux-x64" ;;
            arm64) ORT_ARCH="linux-aarch64" ;;
          esac
          ORT_VER=1.27.1
          curl -fsSL --retry 3 \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VER}/onnxruntime-${ORT_ARCH}-${ORT_VER}.tgz" \
            -o /tmp/ort.tgz
          tar -xzf /tmp/ort.tgz -C /tmp
          sudo cp /tmp/onnxruntime-${ORT_ARCH}-${ORT_VER}/lib/libonnxruntime.so* /usr/local/lib/
          sudo ldconfig
          # Also stage for embedding in the -full build (assets/ocr/lib_linux_amd64.go).
          cp /tmp/onnxruntime-${ORT_ARCH}-${ORT_VER}/lib/libonnxruntime.so assets/ocr/libonnxruntime-${{ matrix.goos }}-${{ matrix.goarch }}.so
          echo "[✓] libonnxruntime ${ORT_VER} (${ORT_ARCH}) installed"

      # Install ONNX Runtime for macOS runner so OCR smoke test can run.
      - name: Install ONNX Runtime (macOS)
        if: matrix.goos == 'darwin'
        run: brew install onnxruntime

      # ── 构建 Go 二进制 ──
      # Plain build: no ocr_embed tag → loads system-installed libonnxruntime
      # at runtime (brew install onnxruntime / apt), or OCR returns ErrNotAvailable.
      - name: Build phonefast
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cross-cc }}
          CXX: ${{ matrix.cross-cxx }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/cross-ffmpeg/${{ matrix.ffmpeg-target }}/lib/pkgconfig
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GIT_COMMIT="${GITHUB_SHA::7}"
          BINARY="phonefast-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.BuildTime=${BUILD_TIME} \
            -X main.GitCommit=${GIT_COMMIT}"

          echo "Building: ${BINARY}"
          echo "  Version:    ${VERSION}"
          echo "  GOOS/ARCH:  ${GOOS}/${GOARCH}"
          echo "  PKG_CONFIG: ${PKG_CONFIG_PATH}"
          echo "  CC:         ${CC:-default}"

          go build -trimpath -ldflags="${LDFLAGS}" -o "${BINARY}" ./cmd/phonefast/
          file "${BINARY}"
          ls -lh "${BINARY}"

      # ── Full build (darwin/arm64 + linux/amd64) ──
      # Self-contained binary with embedded ONNX Runtime library.
      # The ORT lib must already be staged in assets/ocr/ (see "Download OCR
      # runtime library" step above for darwin, or "Install ONNX Runtime"
      # for linux).
      - name: Build phonefast (full)
        if: (matrix.goos == 'darwin' && matrix.goarch == 'arm64') || (matrix.goos == 'linux' && matrix.goarch == 'amd64')
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/cross-ffmpeg/${{ matrix.ffmpeg-target }}/lib/pkgconfig
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GIT_COMMIT="${GITHUB_SHA::7}"
          BINARY="phonefast-${{ matrix.goos }}-${{ matrix.goarch }}-full${{ matrix.ext }}"
          LDFLAGS="-s -w \
            -X main.Version=${VERSION} \
            -X main.BuildTime=${BUILD_TIME} \
            -X main.GitCommit=${GIT_COMMIT}"

          echo "Building: ${BINARY}  (self-contained, ocr_embed)"
          echo "  Version:    ${VERSION}"
          echo "  GOOS/ARCH:  ${GOOS}/${GOARCH}"

          go build -trimpath -tags ocr_embed -ldflags="${LDFLAGS}" -o "${BINARY}" ./cmd/phonefast/
          file "${BINARY}"
          ls -lh "${BINARY}"

      # ── 运行测试 ──
      # Windows 交叉编译产物是 PE 格式，无法在 Linux runner 上运行，
      # 故跳过测试，仅验证二进制存在（见后续 Verify binary 步骤）。
      - name: Run tests
        if: matrix.goos != 'windows'
        env:
          CGO_ENABLED: 1
          PKG_CONFIG_PATH: ${{ github.workspace }}/build/cross-ffmpeg/${{ matrix.ffmpeg-target }}/lib/pkgconfig
        run: |
          go test -count=1 -timeout 120s $(go list ./... | grep -v tests/ocr-benchmark)

      # Windows 交叉编译产物为 PE 格式，无法在 Linux runner 上运行测试，
      # 改为验证二进制文件完整性。
      - name: Verify binary (Windows cross)
        if: matrix.goos == 'windows'
        run: |
          BINARY="phonefast-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          file "${BINARY}"
          ls -lh "${BINARY}"
          echo "[✓] Windows PE binary built successfully"

      # ── 打包 ──
      - name: Package binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="phonefast-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          ARCHIVE="phonefast-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" \
            "${BINARY}" \
            README.md \
            docs/ 2>/dev/null || tar -czf "${ARCHIVE}" "${BINARY}" README.md
          ls -lh "${ARCHIVE}"

      - name: Package binary (full)
        if: (matrix.goos == 'darwin' && matrix.goarch == 'arm64') || (matrix.goos == 'linux' && matrix.goarch == 'amd64')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BINARY="phonefast-${{ matrix.goos }}-${{ matrix.goarch }}-full${{ matrix.ext }}"
          ARCHIVE="phonefast-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}-full.tar.gz"
          tar -czf "${ARCHIVE}" \
            "${BINARY}" \
            README.md \
            docs/ 2>/dev/null || tar -czf "${ARCHIVE}" "${BINARY}" README.md
          ls -lh "${ARCHIVE}"

      # ── 上传构建产物 ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonefast-${{ matrix.name }}
          path: phonefast-*.tar.gz
          retention-days: 7

  # ── 聚合发布到 GitHub Release ────────────────────────────────────────
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Collect release assets
        run: |
          mkdir -p assets
          find release-artifacts -name "*.tar.gz" -exec cp -v {} assets/ \;
          ls -lh assets/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          VERSION_NOV="${VERSION#v}"
          # Build release body with template + sed (preserve formatting, expand variables)
          cat > release-body.md <<- 'TEMPLATE'
          ## phonefast __VERSION__

          ### :package: Platform Support
          | Platform | Arch | File |
          |------|------|------|
          | Linux | amd64 | `phonefast-__VERSION_NOV__-linux-amd64.tar.gz` |
          | Linux | amd64 | `phonefast-__VERSION_NOV__-linux-amd64-full.tar.gz` (self-contained, OCR embedded) |
          | Linux | arm64 | `phonefast-__VERSION_NOV__-linux-arm64.tar.gz` |
          | macOS | arm64 (Apple Silicon) | `phonefast-__VERSION_NOV__-darwin-arm64.tar.gz` |
          | macOS | arm64 (Apple Silicon) | `phonefast-__VERSION_NOV__-darwin-arm64-full.tar.gz` (self-contained, OCR embedded) |
          | Windows | amd64 | `phonefast-__VERSION_NOV__-windows-amd64.tar.gz` |

          ### :wrench: Highlights
          - CGO statically-linked FFmpeg libavcodec (H.264 hardware decode)
          - x86_64: SSE/AVX/AVX2 SIMD acceleration (nasm asm-on)
          - ARM64: NEON optimized (built-in clang/gcc)
          - Single-file distribution (jar embedded, download-and-run)
          - `-full` variant: ONNX Runtime embedded, zero-dependency deployment (macOS arm64 / Linux amd64)
          TEMPLATE
          sed -i \
            -e "s/__VERSION__/${VERSION}/g" \
            -e "s/__VERSION_NOV__/${VERSION_NOV}/g" \
            release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: ${{ steps.notes.outputs.version }}
          body_path: release-body.md
          files: assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
